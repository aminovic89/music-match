name: Pipeline PROD — main

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/music-match-api
  AZURE_WEBAPP_NAME_PROD: music-match-api-prod

jobs:
  # ─── 1. LINT & TESTS ─────────────────────────────────────
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: musicmatch_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=apps/api

      - name: Initialize test database schema
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres psql -h localhost -U postgres -d musicmatch_test -f apps/api/src/database/init.sql

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/musicmatch_test
          JWT_SECRET: test-secret-ci
          NODE_ENV: test
        run: npm test -- --coverage

  # ─── 2. BUILD & PUSH IMAGE DOCKER → GHCR (gratuit) ──────
  build:
    name: Build & Push Docker → GHCR
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          VERSION=$(node -p "require('./package.json').version")
          echo "image_tag=v${VERSION}-${SHA}" >> $GITHUB_OUTPUT
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Build & Push image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          TAG=${{ steps.meta.outputs.image_tag }}
          VERSION=${{ steps.meta.outputs.version }}
          docker build -f apps/api/Dockerfile -t ${IMAGE}:${TAG} -t ${IMAGE}:latest -t ${IMAGE}:${VERSION} .
          docker push ${IMAGE}:${TAG}
          docker push ${IMAGE}:latest
          docker push ${IMAGE}:${VERSION}

  # ─── 3. DEPLOY → AZURE PROD ──────────────────────────────
  deploy-prod:
    name: Deploy → Azure PROD
    runs-on: ubuntu-latest
    needs: build
    environment: prod

    permissions:
      contents: write

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}

      - name: Deploy API to App Service PROD
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_PROD }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

      # ⚠️ DÉSACTIVÉ : src/database/migrate.js n'existe pas encore (Sprint 1
      # pas commencé) + l'image mcr.microsoft.com/azure-cli a un souci
      # d'auth anonyme sur le registre Microsoft en ce moment.
      # Réactiver une fois le Sprint 1 (migrations) en place.
      # - name: Run DB migrations PROD
      #   uses: azure/CLI@v1
      #   with:
      #     inlineScript: |
      #       az webapp ssh --name ${{ env.AZURE_WEBAPP_NAME_PROD }} \
      #         --resource-group music-match-prod-rg \
      #         --command "cd /app && node src/database/migrate.js"

      - name: Health check PROD
        run: |
          sleep 20
          curl --fail https://${{ env.AZURE_WEBAPP_NAME_PROD }}.azurewebsites.net/health \
            || (echo "Health check PROD failed" && exit 1)

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ needs.build.outputs.version }}',
              name: 'Release ${{ needs.build.outputs.version }}',
              body: 'Déploiement automatique sur production\nImage: ${{ needs.build.outputs.image_tag }}',
              draft: false,
              prerelease: false
            })

  # ─── 4. DEPLOY WEB PROD → AZURE STATIC WEB APPS ─────────
  deploy-web-prod:
    name: Deploy Web → Azure Static PROD
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build Next.js
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://${{ env.AZURE_WEBAPP_NAME_PROD }}.azurewebsites.net
          NODE_ENV: production
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps PROD
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web
          output_location: .next

  # ─── 5. NOTIFICATION SLACK ───────────────────────────────
  notify:
    name: Notification déploiement
    runs-on: ubuntu-latest
    needs: [build, deploy-prod, deploy-web-prod]
    if: always()

    steps:
      - name: Notify success
        if: needs.deploy-prod.result == 'success'
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "Music Match ${{ needs.build.outputs.version }} déployé en production"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Notify failure
        if: needs.deploy-prod.result == 'failure'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "Échec du déploiement PROD Music Match — vérifier les logs"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
