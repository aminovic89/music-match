name: Pipeline DEV — develop

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

env:
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/music-match-api
  AZURE_WEBAPP_NAME_DEV: music-match-api-dev
  AZURE_STATIC_WEB_APP_NAME_DEV: music-match-web-dev
  AZURE_RESOURCE_GROUP_DEV: music-match-dev-rg

jobs:
  # ─── 1. LINT & TESTS ─────────────────────────────────────
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: musicmatch_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=apps/api

      - name: Initialize test database schema
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres psql -h localhost -U postgres -d musicmatch_test -f apps/api/src/database/init.sql

      - name: Run migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/musicmatch_test
          NODE_ENV: test
        run: node src/database/migrate.js

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/musicmatch_test
          JWT_SECRET: test-secret-ci
          NODE_ENV: test
        run: npm test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/api/coverage/

  # ─── 2. BUILD & PUSH IMAGE DOCKER → GHCR (gratuit) ──────
  build:
    name: Build & Push Docker → GHCR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "image_tag=dev-${SHA}" >> $GITHUB_OUTPUT

      - name: Build & Push image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          TAG=${{ steps.meta.outputs.image_tag }}
          docker build -f apps/api/Dockerfile -t ${IMAGE}:${TAG} -t ${IMAGE}:dev-latest .
          docker push ${IMAGE}:${TAG}
          docker push ${IMAGE}:dev-latest

  # ─── 3. DEPLOY → AZURE DEV ───────────────────────────────
  deploy-dev:
    name: Deploy → Azure DEV
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_DEV }}

      - name: Set FRONTEND_URL app setting (CORS)
        run: |
          SWA_HOSTNAME=$(az staticwebapp show \
            --name ${{ env.AZURE_STATIC_WEB_APP_NAME_DEV }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP_DEV }} \
            --query "defaultHostname" -o tsv)
          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME_DEV }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP_DEV }} \
            --settings FRONTEND_URL="https://${SWA_HOSTNAME}"

      - name: Deploy API to App Service DEV
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_DEV }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

      - name: Health check DEV
        run: |
          sleep 30
          curl --fail https://${{ env.AZURE_WEBAPP_NAME_DEV }}.azurewebsites.net/health \
            || (echo "Health check failed" && exit 1)

      - name: Comment PR with DEV URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Déployé sur DEV : https://${{ env.AZURE_WEBAPP_NAME_DEV }}.azurewebsites.net'
            })

  # ─── 4. DEPLOY WEB DEV → AZURE STATIC WEB APPS ──────────
  deploy-web-dev:
    name: Deploy Web → Azure Static DEV
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build Next.js
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://${{ env.AZURE_WEBAPP_NAME_DEV }}.azurewebsites.net
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps DEV
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN_DEV }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web
          output_location: out
